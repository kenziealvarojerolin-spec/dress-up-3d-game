<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(31, 38, 135, 0.5);
        }

        .city-name {
            color: #64b5f6;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .timezone {
            color: #90caf9;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .digital-clock {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .time {
            color: #00ff88;
            font-size: 36px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 8px;
        }

        .date {
            color: #64b5f6;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .analog-clock {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid #64b5f6;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-center {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 0 5px #00ff88;
        }

        .hand {
            position: absolute;
            background: #64b5f6;
            border-radius: 10px;
            transform-origin: bottom center;
            left: 50%;
        }

        .hour-hand {
            width: 4px;
            height: 35px;
            margin-left: -2px;
            margin-bottom: 0;
            background: #00ff88;
        }

        .minute-hand {
            width: 3px;
            height: 45px;
            margin-left: -1.5px;
            margin-bottom: 0;
        }

        .second-hand {
            width: 2px;
            height: 50px;
            margin-left: -1px;
            margin-bottom: 0;
            background: #ff6b6b;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #64b5f6;
            font-size: 10px;
            font-weight: bold;
        }

        .number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .add-timezone {
            text-align: center;
            margin-top: 30px;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .reset-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .timezone-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .timezone-option {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .timezone-option:hover {
            background: rgba(100, 181, 246, 0.3);
            border-color: #64b5f6;
        }

        .timezone-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 107, 107, 0.6);
            border: none;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 107, 107, 1);
        }

        .clock-card {
            position: relative;
        }

        @media (max-width: 768px) {
            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .time {
                font-size: 28px;
            }

            .timezone-selector {
                flex-direction: column;
            }

            .timezone-option {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 World Clock</h1>
            <p>Current time in different time zones around the world</p>
        </div>

        <div class="timezone-selector" id="timezoneSelector"></div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="add-timezone">
            <button class="add-btn" onclick="showAllTimezones()">+ Add More Time Zones</button>
            <button class="reset-btn" onclick="resetToDefault()">🔄 Reset to Default</button>
        </div>
    </div>

    <!-- Modal for timezone selection -->
    <div id="timezoneModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #1e3c72; border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; color: white;">
            <h2 style="margin-bottom: 20px;">Select Time Zones</h2>
            <div id="timezoneList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px;"></div>
            <button onclick="closeTimezoneModal()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Done</button>
        </div>
    </div>

    <script>
        const defaultTimezones = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Singapore', timezone: 'Asia/Singapore' }
        ];

        const allTimezones = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
            { name: 'Chicago', timezone: 'America/Chicago' },
            { name: 'Denver', timezone: 'America/Denver' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Paris', timezone: 'Europe/Paris' },
            { name: 'Berlin', timezone: 'Europe/Berlin' },
            { name: 'Moscow', timezone: 'Europe/Moscow' },
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
            { name: 'Singapore', timezone: 'Asia/Singapore' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Seoul', timezone: 'Asia/Seoul' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata' },
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Melbourne', timezone: 'Australia/Melbourne' },
            { name: 'Auckland', timezone: 'Pacific/Auckland' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
            { name: 'Mexico City', timezone: 'America/Mexico_City' },
            { name: 'Toronto', timezone: 'America/Toronto' },
            { name: 'Vancouver', timezone: 'America/Vancouver' },
            { name: 'Istanbul', timezone: 'Europe/Istanbul' },
            { name: 'Cairo', timezone: 'Africa/Cairo' },
            { name: 'Lagos', timezone: 'Africa/Lagos' },
            { name: 'Johannesburg', timezone: 'Africa/Johannesburg' }
        ];

        let selectedTimezones = [...defaultTimezones];

        function init() {
            updateClocks();
            setInterval(updateClocks, 1000);
            renderSelector();
        }

        function updateClocks() {
            const clocksGrid = document.getElementById('clocksGrid');
            clocksGrid.innerHTML = '';

            selectedTimezones.forEach((tz, index) => {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });

                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz.timezone,
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                const timeParts = formatter.formatToParts(now);
                const dateParts = dateFormatter.format(now);

                const time = timeParts.map(part => 
                    part.type === 'literal' ? part.value : part.value
                ).join('');

                const clockCard = document.createElement('div');
                clockCard.className = 'clock-card';
                clockCard.innerHTML = `
                    <button class="remove-btn" onclick="removeTimezone(${index})">×</button>
                    <div class="city-name">${tz.name}</div>
                    <div class="timezone">${tz.timezone}</div>
                    <div class="digital-clock">
                        <div class="time" id="time-${index}">${time}</div>
                        <div class="date">${dateParts}</div>
                    </div>
                    <div class="analog-clock" id="analog-${index}">
                        <div class="number">
                            <span style="top: 5px;">12</span>
                            <span style="right: 5px; top: 50%; transform: translateY(-50%); translateX(0);">3</span>
                            <span style="bottom: 5px; left: 50%; transform: translateX(-50%);">6</span>
                            <span style="left: 5px; top: 50%; transform: translateY(-50%);">9</span>
                        </div>
                        <div class="hand hour-hand" id="hour-${index}"></div>
                        <div class="hand minute-hand" id="minute-${index}"></div>
                        <div class="hand second-hand" id="second-${index}"></div>
                        <div class="clock-center"></div>
                    </div>
                `;

                clocksGrid.appendChild(clockCard);
                updateAnalogClock(tz.timezone, index);
            });
        }

        function updateAnalogClock(timezone, index) {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const timeParts = formatter.formatToParts(now);
            const timeObj = {};
            timeParts.forEach(part => {
                if (part.type !== 'literal') {
                    timeObj[part.type] = parseInt(part.value);
                }
            });

            const hours = timeObj.hour || 0;
            const minutes = timeObj.minute || 0;
            const seconds = timeObj.second || 0;

            const hourDeg = (hours % 12) * 30 + (minutes / 60) * 30;
            const minuteDeg = minutes * 6 + (seconds / 60) * 6;
            const secondDeg = seconds * 6;

            const hourHand = document.getElementById(`hour-${index}`);
            const minuteHand = document.getElementById(`minute-${index}`);
            const secondHand = document.getElementById(`second-${index}`);
            const timeDisplay = document.getElementById(`time-${index}`);

            if (hourHand) hourHand.style.transform = `rotate(${hourDeg}deg)`;
            if (minuteHand) minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
            if (secondHand) secondHand.style.transform = `rotate(${secondDeg}deg)`;

            const digitFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            if (timeDisplay) timeDisplay.textContent = digitFormatter.format(now);
        }

        function renderSelector() {
            const selector = document.getElementById('timezoneSelector');
            selector.innerHTML = '';

            allTimezones.slice(0, 8).forEach(tz => {
                const isActive = selectedTimezones.some(s => s.timezone === tz.timezone);
                const btn = document.createElement('button');
                btn.className = `timezone-option ${isActive ? 'active' : ''}`;
                btn.textContent = tz.name;
                btn.onclick = () => toggleTimezone(tz);
                selector.appendChild(btn);
            });
        }

        function toggleTimezone(tz) {
            const index = selectedTimezones.findIndex(s => s.timezone === tz.timezone);
            if (index > -1) {
                selectedTimezones.splice(index, 1);
            } else {
                selectedTimezones.push(tz);
            }
            renderSelector();
            updateClocks();
        }

        function removeTimezone(index) {
            selectedTimezones.splice(index, 1);
            updateClocks();
            renderSelector();
        }

        function showAllTimezones() {
            const modal = document.getElementById('timezoneModal');
            const list = document.getElementById('timezoneList');
            list.innerHTML = '';

            allTimezones.forEach(tz => {
                const isActive = selectedTimezones.some(s => s.timezone === tz.timezone);
                const btn = document.createElement('button');
                btn.className = `timezone-option ${isActive ? 'active' : ''}`;
                btn.textContent = tz.name;
                btn.style.cursor = 'pointer';
                btn.onclick = () => toggleTimezone(tz);
                list.appendChild(btn);
            });

            modal.style.display = 'flex';
        }

        function closeTimezoneModal() {
            document.getElementById('timezoneModal').style.display = 'none';
        }

        function resetToDefault() {
            selectedTimezones = [...defaultTimezones];
            renderSelector();
            updateClocks();
        }

        // Close modal when clicking outside
        document.getElementById('timezoneModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTimezoneModal();
            }
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dress Up Game - Fashion Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 20px;
            padding: 20px;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-width: 400px;
        }

        #canvas {
            flex: 1;
            width: 100%;
            background: linear-gradient(to bottom, #E8F4F8 0%, #B8E6F0 100%);
            border-radius: 12px;
            border: 3px solid #667eea;
            display: block;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        .controls-panel {
            flex: 0.8;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto;
            min-width: 300px;
        }

        .controls-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .clothing-group {
            margin-bottom: 18px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .clothing-group h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .clothing-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 8px;
        }

        .clothing-btn {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            user-select: none;
        }

        .clothing-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .clothing-btn:active {
            transform: translateY(0);
        }

        .clothing-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .title {
            text-align: center;
            color: #333;
        }

        .title h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 3px;
        }

        .title p {
            color: #666;
            font-size: 12px;
        }

        .info-text {
            text-align: center;
            color: #667eea;
            font-size: 11px;
            padding: 8px;
            background: #f0f4ff;
            border-radius: 6px;
            font-weight: bold;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .game-area {
                min-width: auto;
                min-height: 400px;
            }

            .controls-panel {
                min-width: auto;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="title">
                <h1>👗 Fashion Studio 3D</h1>
                <p>Ciptakan gaya fashionmu!</p>
            </div>
            <canvas id="canvas"></canvas>
            <div class="info-text">
                🖱️ Drag = Rotate | 🔄 Scroll = Zoom
            </div>
        </div>

        <div class="controls-panel">
            <h3>🎨 Pilihan Fashion</h3>

            <div class="clothing-group">
                <h4>👤 Model</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="model" data-style="female">👩 Wanita</button>
                    <button class="clothing-btn" data-type="model" data-style="male">👨 Pria</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👕 Baju Atas</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="top" data-style="tshirt">T-Shirt</button>
                    <button class="clothing-btn" data-type="top" data-style="tank">Tank Top</button>
                    <button class="clothing-btn" data-type="top" data-style="dress">Dress</button>
                    <button class="clothing-btn" data-type="top" data-style="jacket">Jaket</button>
                    <button class="clothing-btn" data-type="top" data-style="hoodie">Hoodie</button>
                    <button class="clothing-btn" data-type="top" data-style="crop">Crop Top</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👖 Baju Bawah</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="bottom" data-style="pants">Celana</button>
                    <button class="clothing-btn" data-type="bottom" data-style="skirt">Rok</button>
                    <button class="clothing-btn" data-type="bottom" data-style="shorts">Shorts</button>
                    <button class="clothing-btn" data-type="bottom" data-style="jeans">Jeans</button>
                    <button class="clothing-btn" data-type="bottom" data-style="overalls">Overalls</button>
                    <button class="clothing-btn" data-type="bottom" data-style="leggings">Leggings</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👞 Sepatu</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="shoes" data-style="sneakers">Sneakers</button>
                    <button class="clothing-btn" data-type="shoes" data-style="heels">Heels</button>
                    <button class="clothing-btn" data-type="shoes" data-style="boots">Boots</button>
                    <button class="clothing-btn" data-type="shoes" data-style="flats">Flats</button>
                    <button class="clothing-btn" data-type="shoes" data-style="sandals">Sandals</button>
                    <button class="clothing-btn" data-type="shoes" data-style="sneaker-high">Hi-Top</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>💇 Gaya Rambut</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="hair" data-style="long">Panjang</button>
                    <button class="clothing-btn" data-type="hair" data-style="short">Pendek</button>
                    <button class="clothing-btn" data-type="hair" data-style="curly">Keriting</button>
                    <button class="clothing-btn" data-type="hair" data-style="bun">Bun</button>
                    <button class="clothing-btn" data-type="hair" data-style="wavy">Berombak</button>
                    <button class="clothing-btn" data-type="hair" data-style="ponytail">Ponytail</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>🎨 Warna Baju</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="color" data-style="red" style="background-color: #e74c3c; color: white;">🔴</button>
                    <button class="clothing-btn" data-type="color" data-style="blue" style="background-color: #3498db; color: white;">🔵</button>
                    <button class="clothing-btn" data-type="color" data-style="green" style="background-color: #2ecc71; color: white;">🟢</button>
                    <button class="clothing-btn" data-type="color" data-style="purple" style="background-color: #9b59b6; color: white;">🟣</button>
                    <button class="clothing-btn" data-type="color" data-style="pink" style="background-color: #ff69b4; color: white;">💗</button>
                    <button class="clothing-btn" data-type="color" data-style="black" style="background-color: #000000; color: white;">⚫</button>
                    <button class="clothing-btn" data-type="color" data-style="white" style="background-color: #ffffff; border-color: #999;">⚪</button>
                    <button class="clothing-btn" data-type="color" data-style="yellow" style="background-color: #f1c40f; color: black;">🟡</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>💄 Warna Rambut</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="hair-color" data-style="brown" style="background-color: #8b4513; color: white;">Coklat</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="black" style="background-color: #000000; color: white;">Hitam</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="blonde" style="background-color: #f4d03f; color: black;">Pirang</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="red" style="background-color: #c0392b; color: white;">Merah</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="purple" style="background-color: #8b008b; color: white;">Ungu</button>
                </div>
            </div>

            <button class="reset-btn" onclick="resetCharacter()">🔄 Reset Karakter</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let character = {};
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const colorMap = {
            red: 0xe74c3c,
            blue: 0x3498db,
            green: 0x2ecc71,
            purple: 0x9b59b6,
            pink: 0xff69b4,
            black: 0x1a1a1a,
            white: 0xf5f5f5,
            yellow: 0xf1c40f
        };

        const hairColorMap = {
            brown: 0x8b4513,
            black: 0x1a1a1a,
            blonde: 0xf4d03f,
            red: 0xc0392b,
            purple: 0x8b008b
        };

        function init() {
            const canvas = document.getElementById('canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe8f4f8);
            
            camera = new THREE.PerspectiveCamera(
                75,
                canvas.clientWidth / canvas.clientHeight,
                0.1,
                1000
            );
            camera.position.z = 4;
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            // Lighting - lebih terang
            const ambientLight = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-5, 5, 5);
            scene.add(pointLight);

            createCharacter('female');

            // Event listeners - dengan pointer events buat support touch
            canvas.addEventListener('pointerdown', onPointerDown, false);
            canvas.addEventListener('pointermove', onPointerMove, false);
            canvas.addEventListener('pointerup', onPointerUp, false);
            canvas.addEventListener('wheel', onMouseWheel, false);
            window.addEventListener('resize', onWindowResize, false);

            setupClothingButtons();
            animate();
        }

        function createCharacter(model) {
            if (character.group) {
                scene.remove(character.group);
            }

            const group = new THREE.Group();
            character.group = group;
            character.model = model;

            const skinColor = 0xf4a460;

            // HEAD - lebih besar dan detail
            const headGeometry = new THREE.IcosahedronGeometry(0.5, 6);
            const headMaterial = new THREE.MeshStandardMaterial({ 
                color: skinColor,
                roughness: 0.5,
                metalness: 0.05,
                map: null
            });
            character.head = new THREE.Mesh(headGeometry, headMaterial);
            character.head.position.y = 1.4;
            character.head.castShadow = true;
            character.head.receiveShadow = true;
            group.add(character.head);

            // EYES - tambah mata
            const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const eyeWhiteMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffff,
                roughness: 0.3
            });
            const pupilMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x000000,
                roughness: 0.1
            });

            // Left eye
            const leftEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            leftEyeWhite.position.set(-0.15, 0.15, 0.35);
            leftEyeWhite.scale.set(1, 1, 0.8);
            character.head.add(leftEyeWhite);

            const leftPupil = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 16, 16),
                pupilMaterial
            );
            leftPupil.position.set(-0.15, 0.15, 0.42);
            character.head.add(leftPupil);

            // Right eye
            const rightEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            rightEyeWhite.position.set(0.15, 0.15, 0.35);
            rightEyeWhite.scale.set(1, 1, 0.8);
            character.head.add(rightEyeWhite);

            const rightPupil = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 16, 16),
                pupilMaterial
            );
            rightPupil.position.set(0.15, 0.15, 0.42);
            character.head.add(rightPupil);

            // MOUTH - tambah mulut
            const mouthGeometry = new THREE.TorusGeometry(0.1, 0.03, 16, 100, 0, Math.PI);
            const mouthMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xd75a5a,
                roughness: 0.6
            });
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, -0.15, 0.38);
            mouth.rotation.z = Math.PI;
            character.head.add(mouth);

            // NECK
            const neckGeometry = new THREE.CylinderGeometry(0.2, 0.22, 0.35, 16);
            const neckMaterial = new THREE.MeshStandardMaterial({ 
                color: skinColor,
                roughness: 0.5
            });
            const neck = new THREE.Mesh(neckGeometry, neckMaterial);
            neck.position.y = 0.9;
            neck.castShadow = true;
            neck.receiveShadow = true;
            group.add(neck);

            // BODY - lebih detail
            character.bodyGroup = new THREE.Group();
            character.bodyGroup.position.y = 0.3;

            const torsoGeometry = new THREE.CapsuleGeometry(0.32, 0.75, 4, 12);
            character.bodyMesh = new THREE.Mesh(torsoGeometry);
            character.bodyMesh.castShadow = true;
            character.bodyMesh.receiveShadow = true;
            character.bodyGroup.add(character.bodyMesh);

            const waistGeometry = new THREE.CapsuleGeometry(0.35, 0.2, 4, 12);
            const waist = new THREE.Mesh(waistGeometry);
            waist.position.y = -0.48;
            waist.castShadow = true;
            waist.receiveShadow = true;
            character.bodyGroup.add(waist);

            group.add(character.bodyGroup);

            // ARMS - lebih bagus
            const armGeometry = new THREE.CapsuleGeometry(0.13, 0.95, 4, 12);
            character.arms = [];
            for (let i = -1; i <= 1; i += 2) {
                const arm = new THREE.Mesh(armGeometry);
                arm.position.set(i * 0.58, 0.45, 0);
                arm.rotation.z = i > 0 ? 0.3 : -0.3;
                arm.castShadow = true;
                arm.receiveShadow = true;
                group.add(arm);
                character.arms.push(arm);
            }

            // HANDS
            for (let i = -1; i <= 1; i += 2) {
                const handGeometry = new THREE.SphereGeometry(0.14, 16, 16);
                const hand = new THREE.Mesh(handGeometry);
                hand.position.set(i * 0.58, -0.2, 0);
                hand.castShadow = true;
                hand.receiveShadow = true;
                group.add(hand);
            }

            // LEGS - lebih bagus
            const legGeometry = new THREE.CapsuleGeometry(0.14, 1.05, 4, 12);
            character.legs = [];
            for (let i = -1; i <= 1; i += 2) {
                const leg = new THREE.Mesh(legGeometry);
                leg.position.set(i * 0.22, -0.7, 0);
                leg.castShadow = true;
                leg.receiveShadow = true;
                group.add(leg);
                character.legs.push(leg);
            }

            // FEET
            character.shoes = [];
            for (let i = -1; i <= 1; i += 2) {
                const shoeGeometry = new THREE.BoxGeometry(0.22, 0.15, 0.38, 8, 8, 8);
                const shoe = new THREE.Mesh(shoeGeometry);
                shoe.position.set(i * 0.22, -1.45, 0);
                shoe.castShadow = true;
                shoe.receiveShadow = true;
                group.add(shoe);
                character.shoes.push(shoe);
            }

            // HAIR - lebih bagus
            character.hair = createHair('long', 'brown');
            group.add(character.hair);

            // Update materials
            character.bodyGroup.children.forEach(child => {
                if (child.material) {
                    child.material = new THREE.MeshStandardMaterial({ 
                        color: 0xe74c3c,
                        roughness: 0.4,
                        metalness: 0.05
                    });
                    child.receiveShadow = true;
                }
            });

            character.shoes.forEach(shoe => {
                shoe.material = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff,
                    roughness: 0.5,
                    metalness: 0.1
                });
                shoe.receiveShadow = true;
            });

            // Update arm materials
            character.arms.forEach(arm => {
                arm.material = new THREE.MeshStandardMaterial({
                    color: skinColor,
                    roughness: 0.5
                });
            });

            // Update leg materials
            character.legs.forEach(leg => {
                leg.material = new THREE.MeshStandardMaterial({
                    color: 0x34495e,
                    roughness: 0.5
                });
            });

            scene.add(group);
            
            character.currentModel = model;
            character.currentTop = 'tshirt';
            character.currentBottom = 'pants';
            character.currentShoes = 'sneakers';
            character.currentHair = 'long';
            character.currentColor = 'red';
            character.currentHairColor = 'brown';
        }

        function createHair(style, color) {
            const hairGroup = new THREE.Group();
            const hairColor = hairColorMap[color] || 0x8b4513;

            const hairMaterial = new THREE.MeshStandardMaterial({ 
                color: hairColor,
                roughness: 0.6,
                metalness: 0.05
            });

            if (style === 'long') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.52, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.4, 1);
                hair.position.y = 0.1;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'short') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.48, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 0.75, 1);
                hair.position.y = 0;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'curly') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.54, 6);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.25, 1);
                hair.position.y = 0.08;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'bun') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.46, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.position.y = 0.3;
                hair.castShadow = true;
                hairGroup.add(hair);

                const bunGeometry = new THREE.SphereGeometry(0.28, 16, 16);
                const bun = new THREE.Mesh(bunGeometry, hairMaterial);
                bun.position.y = 0.65;
                bun.castShadow = true;
                hairGroup.add(bun);
            } else if (style === 'wavy') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.51, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.2, 1.15);
                hair.position.y = 0.1;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'ponytail') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.46, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 0.85, 0.9);
                hair.position.y = 0.08;
                hair.castShadow = true;
                hairGroup.add(hair);

                const tailGeometry = new THREE.CapsuleGeometry(0.16, 0.7, 4, 12);
                const tail = new THREE.Mesh(tailGeometry, hairMaterial);
                tail.position.set(0, -0.1, -0.35);
                tail.castShadow = true;
                hairGroup.add(tail);
            }

            return hairGroup;
        }

        function setupClothingButtons() {
            const buttons = document.querySelectorAll('.clothing-btn');
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const type = this.dataset.type;
                    const style = this.dataset.style;

                    const siblings = document.querySelectorAll(`[data-type="${type}"]`);
                    siblings.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    if (type === 'model') {
                        createCharacter(style);
                    } else if (type === 'color') {
                        character.currentColor = style;
                        updateColor(style);
                    } else if (type === 'hair-color') {
                        character.currentHairColor = style;
                        character.group.remove(character.hair);
                        character.hair = createHair(character.currentHair, style);
                        character.group.add(character.hair);
                    } else if (type === 'hair') {
                        character.currentHair = style;
                        character.group.remove(character.hair);
                        character.hair = createHair(style, character.currentHairColor);
                        character.group.add(character.hair);
                    } else if (type === 'top') {
                        character.currentTop = style;
                    } else if (type === 'bottom') {
                        character.currentBottom = style;
                    } else if (type === 'shoes') {
                        character.currentShoes = style;
                        updateShoes(style);
                    }
                }, false);
            });
        }

        function updateColor(color) {
            const hex = colorMap[color] || 0xe74c3c;
            character.bodyMesh.material.color.setHex(hex);
            character.bodyGroup.children.forEach(child => {
                if (child.material && child !== character.bodyMesh) {
                    child.material.color.setHex(hex);
                }
            });
        }

        function updateShoes(style) {
            const shoeColors = {
                sneakers: 0xffffff,
                heels: 0x000000,
                boots: 0x2c3e50,
                flats: 0xf39c12,
                sandals: 0xdaa520,
                'sneaker-high': 0xff6b6b
            };

            character.shoes.forEach(shoe => {
                shoe.material.color.setHex(shoeColors[style] || 0xffffff);
            });
        }

        function onPointerDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onPointerMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        }

        function onPointerUp() {
            isDragging = false;
        }

        function onMouseWheel(e) {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(2.5, Math.min(8, camera.position.z));
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            }
        }

        function resetCharacter() {
            document.querySelectorAll('.clothing-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.querySelectorAll('[data-style="female"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="tshirt"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="pants"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="sneakers"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="long"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="red"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="brown"]').forEach(btn => btn.classList.add('active'));

            createCharacter('female');
        }

        function animate() {
            requestAnimationFrame(animate);

            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;

            if (character.group) {
                character.group.rotation.x = currentRotation.x;
                character.group.rotation.y = currentRotation.y;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('load', init, false);
    </script>
</body>
</html>

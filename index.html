<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dress Up Game - Banyak Pilihan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #canvas {
            width: 100%;
            height: 600px;
            background: linear-gradient(to bottom, #E8F4F8 0%, #B8E6F0 100%);
            border-radius: 15px;
            border: 3px solid #667eea;
        }

        .controls-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            max-height: 650px;
            overflow-y: auto;
        }

        .controls-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .clothing-group {
            margin-bottom: 18px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .clothing-group h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .clothing-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
            gap: 6px;
        }

        .clothing-btn {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }

        .clothing-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .clothing-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .title h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .title p {
            color: #666;
            font-size: 13px;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            #canvas {
                height: 400px;
            }
        }

        .info-text {
            text-align: center;
            color: #667eea;
            font-size: 12px;
            padding: 10px;
            background: #f0f4ff;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="title">
                <h1>👗 Dress Up Fashion 3D</h1>
                <p>Buat gaya fashionmu sendiri!</p>
            </div>
            <canvas id="canvas"></canvas>
            <div class="info-text">
                🖱️ Drag untuk rotate | 🔄 Scroll untuk zoom
            </div>
        </div>

        <div class="controls-panel">
            <h3>🎨 Pilih Pakaian</h3>

            <div class="clothing-group">
                <h4>👤 Model</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="model" data-style="female">Perempuan</button>
                    <button class="clothing-btn" data-type="model" data-style="male">Laki-laki</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👕 Baju Atas</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="top" data-style="tshirt">T-Shirt</button>
                    <button class="clothing-btn" data-type="top" data-style="tank">Tank Top</button>
                    <button class="clothing-btn" data-type="top" data-style="dress">Dress</button>
                    <button class="clothing-btn" data-type="top" data-style="jacket">Jaket</button>
                    <button class="clothing-btn" data-type="top" data-style="hoodie">Hoodie</button>
                    <button class="clothing-btn" data-type="top" data-style="crop">Crop Top</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👖 Baju Bawah</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="bottom" data-style="pants">Celana</button>
                    <button class="clothing-btn" data-type="bottom" data-style="skirt">Rok</button>
                    <button class="clothing-btn" data-type="bottom" data-style="shorts">Shorts</button>
                    <button class="clothing-btn" data-type="bottom" data-style="jeans">Jeans</button>
                    <button class="clothing-btn" data-type="bottom" data-style="overalls">Overalls</button>
                    <button class="clothing-btn" data-type="bottom" data-style="leggings">Leggings</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👞 Sepatu</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="shoes" data-style="sneakers">Sneakers</button>
                    <button class="clothing-btn" data-type="shoes" data-style="heels">Heels</button>
                    <button class="clothing-btn" data-type="shoes" data-style="boots">Boots</button>
                    <button class="clothing-btn" data-type="shoes" data-style="flats">Flats</button>
                    <button class="clothing-btn" data-type="shoes" data-style="sandals">Sandals</button>
                    <button class="clothing-btn" data-type="shoes" data-style="sneaker-high">Hi-Top</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>💇 Gaya Rambut</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="hair" data-style="long">Panjang</button>
                    <button class="clothing-btn" data-type="hair" data-style="short">Pendek</button>
                    <button class="clothing-btn" data-type="hair" data-style="curly">Keriting</button>
                    <button class="clothing-btn" data-type="hair" data-style="bun">Bun</button>
                    <button class="clothing-btn" data-type="hair" data-style="wavy">Berombak</button>
                    <button class="clothing-btn" data-type="hair" data-style="ponytail">Ponytail</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>🎨 Warna Baju</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="color" data-style="red" style="background-color: #e74c3c; color: white;">Merah</button>
                    <button class="clothing-btn" data-type="color" data-style="blue" style="background-color: #3498db; color: white;">Biru</button>
                    <button class="clothing-btn" data-type="color" data-style="green" style="background-color: #2ecc71; color: white;">Hijau</button>
                    <button class="clothing-btn" data-type="color" data-style="purple" style="background-color: #9b59b6; color: white;">Ungu</button>
                    <button class="clothing-btn" data-type="color" data-style="pink" style="background-color: #ff69b4; color: white;">Pink</button>
                    <button class="clothing-btn" data-type="color" data-style="black" style="background-color: #000000; color: white;">Hitam</button>
                    <button class="clothing-btn" data-type="color" data-style="white" style="background-color: #ffffff; border-color: #999;">Putih</button>
                    <button class="clothing-btn" data-type="color" data-style="yellow" style="background-color: #f1c40f; color: black;">Kuning</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>💄 Warna Rambut</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="hair-color" data-style="brown" style="background-color: #8b4513; color: white;">Coklat</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="black" style="background-color: #000000; color: white;">Hitam</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="blonde" style="background-color: #f4d03f; color: black;">Pirang</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="red" style="background-color: #c0392b; color: white;">Merah</button>
                    <button class="clothing-btn" data-type="hair-color" data-style="purple" style="background-color: #8b008b; color: white;">Ungu</button>
                </div>
            </div>

            <button class="reset-btn" onclick="resetCharacter()">🔄 Reset Karakter</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let character = {};
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const colorMap = {
            red: 0xe74c3c,
            blue: 0x3498db,
            green: 0x2ecc71,
            purple: 0x9b59b6,
            pink: 0xff69b4,
            black: 0x000000,
            white: 0xffffff,
            yellow: 0xf1c40f
        };

        const hairColorMap = {
            brown: 0x8b4513,
            black: 0x1a1a1a,
            blonde: 0xf4d03f,
            red: 0xc0392b,
            purple: 0x8b008b
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe8f4f8);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 4;
            
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;

            // Lighting yang lebih bagus
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            createCharacter('female');

            const canvas_elem = document.getElementById('canvas');
            canvas_elem.addEventListener('mousedown', onMouseDown);
            canvas_elem.addEventListener('mousemove', onMouseMove);
            canvas_elem.addEventListener('mouseup', onMouseUp);
            canvas_elem.addEventListener('wheel', onMouseWheel);
            window.addEventListener('resize', onWindowResize);

            setupClothingButtons();
            animate();
        }

        function createCharacter(model) {
            if (character.group) {
                scene.remove(character.group);
            }

            const group = new THREE.Group();
            character.group = group;
            character.model = model;

            const skinColor = 0xf4a460;

            // HEAD
            const headGeometry = new THREE.IcosahedronGeometry(0.45, 5);
            const headMaterial = new THREE.MeshStandardMaterial({ 
                color: skinColor,
                roughness: 0.6,
                metalness: 0.1
            });
            character.head = new THREE.Mesh(headGeometry, headMaterial);
            character.head.position.y = 1.3;
            character.head.castShadow = true;
            group.add(character.head);

            // NECK
            const neckGeometry = new THREE.CylinderGeometry(0.18, 0.2, 0.3, 16);
            const neckMaterial = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.6 });
            const neck = new THREE.Mesh(neckGeometry, neckMaterial);
            neck.position.y = 0.95;
            neck.castShadow = true;
            group.add(neck);

            // BODY
            character.bodyGroup = new THREE.Group();
            character.bodyGroup.position.y = 0.35;

            const torsoGeometry = new THREE.CapsuleGeometry(0.3, 0.7, 4, 8);
            character.bodyMesh = new THREE.Mesh(torsoGeometry);
            character.bodyMesh.position.y = 0;
            character.bodyMesh.castShadow = true;
            character.bodyGroup.add(character.bodyMesh);

            const waistGeometry = new THREE.CapsuleGeometry(0.32, 0.2, 4, 8);
            const waist = new THREE.Mesh(waistGeometry);
            waist.position.y = -0.45;
            waist.castShadow = true;
            character.bodyGroup.add(waist);

            group.add(character.bodyGroup);

            // ARMS
            const armGeometry = new THREE.CapsuleGeometry(0.12, 0.9, 4, 8);
            for (let i = -1; i <= 1; i += 2) {
                const arm = new THREE.Mesh(armGeometry);
                arm.position.set(i * 0.55, 0.5, 0);
                arm.rotation.z = i > 0 ? 0.2 : -0.2;
                arm.castShadow = true;
                group.add(arm);
            }

            // HANDS
            for (let i = -1; i <= 1; i += 2) {
                const handGeometry = new THREE.SphereGeometry(0.13, 16, 16);
                const hand = new THREE.Mesh(handGeometry);
                hand.position.set(i * 0.55, -0.15, 0);
                hand.castShadow = true;
                group.add(hand);
            }

            // LEGS
            const legGeometry = new THREE.CapsuleGeometry(0.13, 1, 4, 8);
            for (let i = -1; i <= 1; i += 2) {
                const leg = new THREE.Mesh(legGeometry);
                leg.position.set(i * 0.2, -0.7, 0);
                leg.castShadow = true;
                group.add(leg);
            }

            // FEET
            character.shoes = [];
            for (let i = -1; i <= 1; i += 2) {
                const shoeGeometry = new THREE.BoxGeometry(0.2, 0.15, 0.35, 8, 8, 8);
                const shoe = new THREE.Mesh(shoeGeometry);
                shoe.position.set(i * 0.2, -1.4, 0);
                shoe.castShadow = true;
                group.add(shoe);
                character.shoes.push(shoe);
            }

            // HAIR
            character.hair = createHair('long', 'brown');
            group.add(character.hair);

            // Update materials
            character.bodyGroup.children.forEach(child => {
                if (child.material) {
                    child.material = new THREE.MeshStandardMaterial({ 
                        color: 0xe74c3c,
                        roughness: 0.5,
                        metalness: 0.1
                    });
                }
            });

            character.shoes.forEach(shoe => {
                shoe.material = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff,
                    roughness: 0.6
                });
            });

            scene.add(group);
            
            character.currentModel = model;
            character.currentTop = 'tshirt';
            character.currentBottom = 'pants';
            character.currentShoes = 'sneakers';
            character.currentHair = 'long';
            character.currentColor = 'red';
            character.currentHairColor = 'brown';
        }

        function createHair(style, color) {
            const hairGroup = new THREE.Group();
            const hairColor = hairColorMap[color] || 0x8b4513;

            const hairMaterial = new THREE.MeshStandardMaterial({ 
                color: hairColor,
                roughness: 0.7
            });

            if (style === 'long') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.48, 4);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.3, 1);
                hair.position.y = 0.15;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'short') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.46, 4);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 0.8, 1);
                hair.position.y = 0.05;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'curly') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.5, 5);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.2, 1);
                hair.position.y = 0.1;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'bun') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.43, 4);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.position.y = 0.35;
                hair.castShadow = true;
                hairGroup.add(hair);

                const bunGeometry = new THREE.SphereGeometry(0.25, 16, 16);
                const bun = new THREE.Mesh(bunGeometry, hairMaterial);
                bun.position.y = 0.6;
                bun.castShadow = true;
                hairGroup.add(bun);
            } else if (style === 'wavy') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.47, 4);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 1.15, 1.1);
                hair.position.y = 0.12;
                hair.castShadow = true;
                hairGroup.add(hair);
            } else if (style === 'ponytail') {
                const hairGeometry = new THREE.IcosahedronGeometry(0.44, 4);
                const hair = new THREE.Mesh(hairGeometry, hairMaterial);
                hair.scale.set(1, 0.9, 0.9);
                hair.position.y = 0.1;
                hair.castShadow = true;
                hairGroup.add(hair);

                const tailGeometry = new THREE.CapsuleGeometry(0.15, 0.6, 4, 8);
                const tail = new THREE.Mesh(tailGeometry, hairMaterial);
                tail.position.set(0, 0, -0.3);
                tail.castShadow = true;
                hairGroup.add(tail);
            }

            return hairGroup;
        }

        function setupClothingButtons() {
            const buttons = document.querySelectorAll('.clothing-btn');
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const type = this.dataset.type;
                    const style = this.dataset.style;

                    const siblings = document.querySelectorAll(`[data-type="${type}"]`);
                    siblings.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    if (type === 'model') {
                        createCharacter(style);
                    } else if (type === 'color') {
                        character.currentColor = style;
                        updateColor(style);
                    } else if (type === 'hair-color') {
                        character.currentHairColor = style;
                        character.group.remove(character.hair);
                        character.hair = createHair(character.currentHair, style);
                        character.group.add(character.hair);
                    } else if (type === 'hair') {
                        character.currentHair = style;
                        character.group.remove(character.hair);
                        character.hair = createHair(style, character.currentHairColor);
                        character.group.add(character.hair);
                    } else if (type === 'top') {
                        character.currentTop = style;
                    } else if (type === 'bottom') {
                        character.currentBottom = style;
                    } else if (type === 'shoes') {
                        character.currentShoes = style;
                        updateShoes(style);
                    }
                });
            });
        }

        function updateColor(color) {
            const hex = colorMap[color] || 0xe74c3c;
            character.bodyMesh.material.color.setHex(hex);
            character.bodyGroup.children.forEach(child => {
                if (child.material && child !== character.bodyMesh) {
                    child.material.color.setHex(hex);
                }
            });
        }

        function updateShoes(style) {
            const shoeColors = {
                sneakers: 0xffffff,
                heels: 0x000000,
                boots: 0x2c3e50,
                flats: 0xf39c12,
                sandals: 0xdaa520,
                'sneaker-high': 0xff6b6b
            };

            character.shoes.forEach(shoe => {
                shoe.material.color.setHex(shoeColors[style] || 0xffffff);
            });
        }

        function onMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(e) {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(2, Math.min(7, camera.position.z));
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            }
        }

        function resetCharacter() {
            document.querySelectorAll('.clothing-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.querySelectorAll('[data-style="female"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="tshirt"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="pants"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="sneakers"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="long"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="red"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="brown"]').forEach(btn => btn.classList.add('active'));

            createCharacter('female');
        }

        function animate() {
            requestAnimationFrame(animate);

            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;

            if (character.group) {
                character.group.rotation.x = currentRotation.x;
                character.group.rotation.y = currentRotation.y;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>

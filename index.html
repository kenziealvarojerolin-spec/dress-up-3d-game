<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dress Up Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #canvas {
            width: 100%;
            height: 500px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .controls-panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .controls-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .clothing-group {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .clothing-group h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .clothing-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
        }

        .clothing-btn {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .clothing-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .clothing-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .title h1 {
            color: #667eea;
            font-size: 24px;
        }

        .title p {
            color: #666;
            font-size: 12px;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            #canvas {
                height: 400px;
            }
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="title">
                <h1>👗 3D Dress Up Game</h1>
                <p>Pilih pakaian dan atur karakter Anda</p>
            </div>
            <canvas id="canvas"></canvas>
            <div class="info-text">
                🖱️ Drag untuk rotate | 🔄 Scroll untuk zoom
            </div>
        </div>

        <div class="controls-panel">
            <h3>🎨 Pilih Pakaian</h3>

            <div class="clothing-group">
                <h4>👕 Baju Atas</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="top" data-style="shirt">Kemeja</button>
                    <button class="clothing-btn" data-type="top" data-style="tshirt">T-Shirt</button>
                    <button class="clothing-btn" data-type="top" data-style="tank">Tank Top</button>
                    <button class="clothing-btn" data-type="top" data-style="dress">Dress</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👖 Baju Bawah</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="bottom" data-style="pants">Celana</button>
                    <button class="clothing-btn" data-type="bottom" data-style="skirt">Rok</button>
                    <button class="clothing-btn" data-type="bottom" data-style="shorts">Shorts</button>
                    <button class="clothing-btn" data-type="bottom" data-style="jeans">Jeans</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>👞 Sepatu</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="shoes" data-style="sneakers">Sneakers</button>
                    <button class="clothing-btn" data-type="shoes" data-style="heels">Heels</button>
                    <button class="clothing-btn" data-type="shoes" data-style="boots">Boots</button>
                    <button class="clothing-btn" data-type="shoes" data-style="flats">Flats</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>💇 Gaya Rambut</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="hair" data-style="long">Panjang</button>
                    <button class="clothing-btn" data-type="hair" data-style="short">Pendek</button>
                    <button class="clothing-btn" data-type="hair" data-style="curly">Keriting</button>
                    <button class="clothing-btn" data-type="hair" data-style="bun">Bun</button>
                </div>
            </div>

            <div class="clothing-group">
                <h4>🎨 Warna</h4>
                <div class="clothing-options">
                    <button class="clothing-btn active" data-type="color" data-style="red" style="background-color: #e74c3c; color: white;">Merah</button>
                    <button class="clothing-btn" data-type="color" data-style="blue" style="background-color: #3498db; color: white;">Biru</button>
                    <button class="clothing-btn" data-type="color" data-style="green" style="background-color: #2ecc71; color: white;">Hijau</button>
                    <button class="clothing-btn" data-type="color" data-style="purple" style="background-color: #9b59b6; color: white;">Ungu</button>
                    <button class="clothing-btn" data-type="color" data-style="pink" style="background-color: #f39c12; color: white;">Orange</button>
                </div>
            </div>

            <button class="reset-btn" onclick="resetCharacter()">🔄 Reset Karakter</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let character = {};
        let clothingMeshes = {};
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const colorMap = {
            red: 0xe74c3c,
            blue: 0x3498db,
            green: 0x2ecc71,
            purple: 0x9b59b6,
            pink: 0xf39c12
        };

        const clothingConfig = {
            top: {
                shirt: { scale: 1, color: 0xe74c3c, name: 'Kemeja' },
                tshirt: { scale: 0.9, color: 0x3498db, name: 'T-Shirt' },
                tank: { scale: 0.8, color: 0x2ecc71, name: 'Tank Top' },
                dress: { scale: 1.2, color: 0xf39c12, name: 'Dress' }
            },
            bottom: {
                pants: { scale: 1, color: 0x34495e, name: 'Celana' },
                skirt: { scale: 1.1, color: 0xe74c3c, name: 'Rok' },
                shorts: { scale: 0.7, color: 0x3498db, name: 'Shorts' },
                jeans: { scale: 1, color: 0x1a5276, name: 'Jeans' }
            },
            shoes: {
                sneakers: { scale: 0.5, color: 0xffffff, name: 'Sneakers' },
                heels: { scale: 0.5, color: 0x000000, name: 'Heels' },
                boots: { scale: 0.6, color: 0x2c3e50, name: 'Boots' },
                flats: { scale: 0.5, color: 0xf39c12, name: 'Flats' }
            },
            hair: {
                long: { length: 2, color: 0x8b4513, name: 'Rambut Panjang' },
                short: { length: 0.5, color: 0x8b4513, name: 'Rambut Pendek' },
                curly: { length: 1.5, color: 0xa0522d, name: 'Rambut Keriting' },
                bun: { length: 1, color: 0x8b4513, name: 'Bun' }
            }
        };

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;
            
            // Renderer setup
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Create character
            createCharacter();

            // Event listeners
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onMouseWheel);
            window.addEventListener('resize', onWindowResize);

            // Setup clothing buttons
            setupClothingButtons();

            // Start animation
            animate();
        }

        function createCharacter() {
            const group = new THREE.Group();

            // Head
            const headGeometry = new THREE.SphereGeometry(0.4, 32, 32);
            const headMaterial = new THREE.MeshStandardMaterial({ color: 0xf4a460 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.2;
            head.castShadow = true;
            group.add(head);

            // Body
            const bodyGeometry = new THREE.ConeGeometry(0.35, 0.8, 32);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            // Arms
            for (let i = -1; i <= 1; i += 2) {
                const armGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 32);
                const armMaterial = new THREE.MeshStandardMaterial({ color: 0xf4a460 });
                const arm = new THREE.Mesh(armGeometry, armMaterial);
                arm.position.set(i * 0.5, 0.8, 0);
                arm.castShadow = true;
                group.add(arm);
            }

            // Legs
            for (let i = -1; i <= 1; i += 2) {
                const legGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 32);
                const legMaterial = new THREE.MeshStandardMaterial({ color: 0x34495e });
                const leg = new THREE.Mesh(legGeometry, legMaterial);
                leg.position.set(i * 0.2, -0.3, 0);
                leg.castShadow = true;
                group.add(leg);
            }

            // Hair
            addHair(group, 'long');

            // Shoes
            for (let i = -1; i <= 1; i += 2) {
                const shoeGeometry = new THREE.BoxGeometry(0.15, 0.1, 0.3);
                const shoeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const shoe = new THREE.Mesh(shoeGeometry, shoeMaterial);
                shoe.position.set(i * 0.2, -0.8, 0);
                shoe.castShadow = true;
                group.add(shoe);
                clothingMeshes.shoes = shoe;
            }

            group.castShadow = true;
            scene.add(group);
            character.group = group;
            character.head = head;
            character.body = body;

            // Initialize default clothing
            character.currentTop = 'shirt';
            character.currentBottom = 'pants';
            character.currentShoes = 'sneakers';
            character.currentHair = 'long';
            character.currentColor = 'red';
        }

        function addHair(group, style) {
            if (clothingMeshes.hair) {
                group.remove(clothingMeshes.hair);
            }

            const hairGeometry = new THREE.SphereGeometry(0.42, 32, 32);
            const hairMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const hair = new THREE.Mesh(hairGeometry, hairMaterial);
            hair.position.y = 1.3;
            hair.scale.set(1, 1.2, 1);
            hair.castShadow = true;
            group.add(hair);
            clothingMeshes.hair = hair;
        }

        function setupClothingButtons() {
            const buttons = document.querySelectorAll('.clothing-btn');
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const type = this.dataset.type;
                    const style = this.dataset.style;

                    // Remove active class from siblings
                    const siblings = document.querySelectorAll(`[data-type="${type}"]`);
                    siblings.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    // Update character
                    if (type === 'color') {
                        character.currentColor = style;
                        updateClothingColor(style);
                    } else if (type === 'hair') {
                        character.currentHair = style;
                        addHair(character.group, style);
                    } else if (type === 'top') {
                        character.currentTop = style;
                        updateClothing();
                    } else if (type === 'bottom') {
                        character.currentBottom = style;
                        updateClothing();
                    } else if (type === 'shoes') {
                        character.currentShoes = style;
                        updateClothing();
                    }
                });
            });
        }

        function updateClothing() {
            // Update body color based on current selections
            const topConfig = clothingConfig.top[character.currentTop];
            const bottomConfig = clothingConfig.bottom[character.currentBottom];

            character.body.material.color.setHex(topConfig.color);
        }

        function updateClothingColor(color) {
            const hex = colorMap[color];
            character.body.material.color.setHex(hex);
        }

        function onMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                targetRotation.y += deltaX * 0.005;
                targetRotation.x += deltaY * 0.005;

                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(e) {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(1.5, Math.min(5, camera.position.z));
        }

        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            if (canvas.clientWidth > 0 && canvas.clientHeight > 0) {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            }
        }

        function resetCharacter() {
            // Reset buttons
            document.querySelectorAll('.clothing-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('[data-style="shirt"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="pants"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="sneakers"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="long"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-style="red"]').forEach(btn => btn.classList.add('active'));

            // Reset character
            character.currentTop = 'shirt';
            character.currentBottom = 'pants';
            character.currentShoes = 'sneakers';
            character.currentHair = 'long';
            character.currentColor = 'red';
            updateClothing();
            addHair(character.group, 'long');
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth rotation
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;

            if (character.group) {
                character.group.rotation.x = currentRotation.x;
                character.group.rotation.y = currentRotation.y;
            }

            renderer.render(scene, camera);
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
